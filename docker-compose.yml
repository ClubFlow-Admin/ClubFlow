services:
  postgres:
    image: postgres:16-alpine
    container_name: clubflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clubflow
      POSTGRES_PASSWORD: clubflow
      POSTGRES_DB: clubflow
    ports:
      - "5432:5432"
    volumes:
      - clubflow-postgres-data:/var/lib/postgresql/data

volumes:
  clubflow-postgres-data:
